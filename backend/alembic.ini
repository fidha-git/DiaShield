[alembic]

# Path to migration scripts
script_location = new_migrations

# Add current project to Python path
prepend_sys_path = .

# Path separator
path_separator = os

# Database URL
sqlalchemy.url = postgresql://neondb_owner:npg_B52OrHPoCDMf@ep-silent-hill-aqn827eb-pooler.c-8.us-east-1.aws.neon.tech/neondb?sslmode=require


[post_write_hooks]


[loggers]
keys = root,sqlalchemy,alembic


[handlers]
keys = console


[formatters]
keys = generic


[logger_root]
level = WARNING
handlers = console


[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine


[logger_alembic]
level = INFO
handlers =
qualname = alembic


[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic


[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S